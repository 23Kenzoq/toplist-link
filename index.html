<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Sapphire2 - Votează Serverul</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0b0f1a, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        .container {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        img.logo {
            max-width: 350px;
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .toplist {
            margin-top: 20px;
        }

        .toplist img {
            max-width: 280px;
            transition: 0.3s;
        }

        .toplist img:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- LOGO SAPPHIRE -->
        <img src="https://i.imgur.com/xE3rT7w.png" class="logo">

        <h1>Votează Sapphire2</h1>
        <p>Ajută serverul să urce în Toplist 🔥</p>

        <!-- BACKLINK OBLIGATORIU (NU MODIFICA) -->
        <div class="toplist">
            <a target="_blank" href="https://metin2pserver.net/" title="Metin2 Pservers Topliste" data-id="4174">
                <img src="https://metin2pserver.net/assets/img/metin2-pserver-toplist-logo.png" alt="metin2pservernet">
            </a>
        </div>

    </div>

</body>
</html>
